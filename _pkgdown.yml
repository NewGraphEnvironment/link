url: https://newgraphenvironment.github.io/link/

template:
  bootstrap: 5

reference:
  - title: Configs
    desc: Load a pipeline config bundle (rules, parameters, overrides)
    contents:
      - lnk_config

  - title: Pipeline phases
    desc: Composable per-AOI habitat classification building blocks. Call in order for a full run.
    contents:
      - starts_with("lnk_pipeline_")

  - title: Thresholds
    desc: Configurable scoring defaults
    contents:
      - lnk_thresholds

  - title: Database
    desc: Connection and utilities
    contents:
      - lnk_db_conn

  - title: Loading
    desc: Load and validate CSV data into database
    contents:
      - lnk_load

  - title: Overrides
    desc: Validate and apply correction data
    contents:
      - starts_with("lnk_override")

  - title: Barrier Overrides
    desc: Build species-specific barrier skip lists from observations and habitat confirmations
    contents:
      - lnk_barrier_overrides

  - title: Rules
    desc: Build habitat rules YAML from dimensions CSV
    contents:
      - lnk_rules_build

  - title: Matching
    desc: Link crossing records across data systems
    contents:
      - starts_with("lnk_match")

  - title: Scoring
    desc: Severity classification and custom scoring
    contents:
      - starts_with("lnk_score")

  - title: Bridge
    desc: Produce fresh-compatible break source tables
    contents:
      - lnk_source

  - title: Habitat
    desc: Per-crossing upstream habitat rollup
    contents:
      - lnk_aggregate
