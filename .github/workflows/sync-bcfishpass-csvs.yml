# Weekly sync of bcfishpass-sourced override CSVs from the NGE-owned
# bucket s3://fresh-bc/bcfishpass/ (populated by NewGraphEnvironment/db_newgraph
# weekly Wed 12:00 UTC, pinned to the SHA from the latest successful
# smnorris/bcfishpass:ng-prod run).
#
# Drift kinds:
#   byte  -- file content changed but column structure didn't.
#            Auto-PR opens AND auto-merges. Discoverability via the
#            PR list; review is not expected (CSVs are upstream-
#            curated and shape stayed the same).
#   shape -- column rename / add / remove / reshape OR canonical-schema
#            validation failure. Auto-PR opens with `schema-drift`
#            label, NOT auto-merged. Workflow exits non-zero so the
#            Actions tab shows red. Coordinated review across link /
#            fresh / crate is required before merging -- see link#64.
#   none  -- no drift, exit clean.
#
# Cadence rationale: bcfishpass tunnel rebuilds Tuesdays ~20:00 PDT
# (smnorris/bcfishpass:ng-prod run finishes 02:55-06:31 UTC Wed across
# last 6 runs). NewGraphEnvironment/db_newgraph dumps to s3://fresh-bc
# at 12:00 UTC Wed (= 5 AM PDT), ~5.5h past the worst observed
# completion. The dump itself completes in ~30 s. This workflow runs
# at 13:00 UTC Wed (= 6 AM PDT), ~1h after the upstream dump --
# generous cushion vs. dump duration. Re-running against the same
# upstream produces no changes.
#
# Source flipped from gh api -> s3://fresh-bc on 2026-05-07 (link#117 +
# NewGraphEnvironment/db_newgraph#4 / PR #5). Eliminates GitHub-API
# SHA-walking and pins each sync to the exact rebuild SHA.
#
# Caveat: PRs created by GITHUB_TOKEN do not trigger downstream
# workflows. Today none exist, so this is benign. If R-CMD-check is
# added later, switch to a PAT-backed token or run checks here before
# merging.

name: sync-bcfishpass-csvs

on:
  schedule:
    - cron: '0 13 * * WED'  # 13:00 UTC Wed = 06:00 PDT, ~1h after upstream dump (which itself runs <1 min)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Install link from the local checkout (DESCRIPTION-driven so httr,
      # jsonlite, crate, yaml, digest, etc. all come along).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.

      - name: Run sync script
        run: Rscript data-raw/sync_bcfishpass_csvs.R

      - name: Open PR (auto-merge byte drift; halt on shape drift)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DRIFT_KIND="$(cat /tmp/sync_drift_kind 2>/dev/null || echo none)"
          echo "Drift kind: $DRIFT_KIND"
          case "$DRIFT_KIND" in
            none)
              echo "No drift -- exit clean"
              exit 0
              ;;
            byte|shape)
              # fallthrough to PR creation
              ;;
            *)
              echo "Unknown drift kind: '$DRIFT_KIND' -- failing loud"
              exit 1
              ;;
          esac

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Drift kind reported $DRIFT_KIND but working tree clean -- bug"
            exit 1
          fi

          DATESTAMP="$(date -u +%Y%m%d)"
          BRANCH="csv-sync/${DATESTAMP}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="csv-sync/${DATESTAMP}-${GITHUB_RUN_ID}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add inst/extdata/configs/ data-raw/logs/bcfp_baselines.csv
          if [[ "$DRIFT_KIND" == "shape" ]]; then
            git commit -m "csv-sync: SHAPE DRIFT -- pull bcfishpass overrides ${DATESTAMP}"
          else
            git commit -m "csv-sync: pull bcfishpass overrides ${DATESTAMP}"
          fi
          git push -u origin "$BRANCH"

          BODY_FILE=/tmp/sync_summary.md
          if [[ ! -f "$BODY_FILE" ]]; then
            echo "Auto-generated CSV sync." > "$BODY_FILE"
          fi

          if [[ "$DRIFT_KIND" == "shape" ]]; then
            # Ensure label exists; ignore "already exists" error.
            gh label create schema-drift \
              --color B60205 \
              --description "Upstream CSV shape changed (column rename / add / remove / reshape) -- coordinated link/fresh/crate review needed before merging" \
              || true
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "csv-sync: SHAPE DRIFT -- pull bcfishpass overrides ${DATESTAMP}" \
              --body-file "$BODY_FILE" \
              --label schema-drift)
            echo "Created shape-drift PR (NOT auto-merged): $PR_URL"
            # Fail loud so the Actions tab shows red and someone notices.
            exit 2
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "csv-sync: pull bcfishpass overrides ${DATESTAMP}" \
              --body-file "$BODY_FILE")
            echo "Created byte-drift PR: $PR_URL"
            # Plain `--merge` (no `--auto`): main has no branch protection
            # rules, so `--auto` errors with "Pull request Branch does not
            # have required protected branch rules". When/if branch protection
            # is added, swap to `--auto` so the merge queues against checks.
            gh pr merge "$PR_URL" --merge --delete-branch
          fi
