name: bcfishpass
description: |
  Validation config — reproduces bcfishpass output exactly for regression.
  Used as the reference against which newgraph defaults and other pipeline
  variants are compared. Do not modify without running the full comparison
  suite across ADMS, BULK, BABL, ELKR.
files:
  rules_yaml: rules.yaml
  dimensions_csv: dimensions.csv
  parameters_fresh: parameters_fresh.csv
  habitat_classification: overrides/user_habitat_classification.csv
  observation_exclusions: overrides/observation_exclusions.csv
  wsg_species: overrides/wsg_species_presence.csv
overrides:
  modelled_fixes: overrides/user_modelled_crossing_fixes.csv
  pscis_barrier_status: overrides/user_pscis_barrier_status.csv
  pscis_xref: overrides/pscis_modelledcrossings_streams_xref.csv
  barriers_definite: overrides/user_barriers_definite.csv
  barriers_definite_control: overrides/user_barriers_definite_control.csv
  crossings_misc: overrides/user_crossings_misc.csv
pipeline:
  break_order:
    - observations
    - gradient_minimal
    - barriers_definite
    - habitat_endpoints
    - crossings
  cluster:
    three_phase: true
  spawn_connected:
    SK:
      gradient_max: 0.05

# Per-file provenance for drift detection. Recompute with
# `lnk_config_verify(cfg)`. External files record the source repo +
# commit + sync date; generated files record their generator; hand-
# authored files record the link sha at time of edit. Edit by hand only
# when re-syncing or after intentional edits.
