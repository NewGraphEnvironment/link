name: default
description: |
  NewGraph default habitat-classification config. Departures from
  bcfishpass are documented in `research/default_vs_bcfishpass.md`:
  intermittent streams included in the rearing set; wetland reaches
  (edge_type 1050/1150) as rearing habitat for species flagged
  `rear_wetland=yes` in dimensions.csv; lake rearing expanded beyond
  SK/KO per literature; `river_skip_cw_min=yes` on river polygons
  where channel-width thresholds don't apply; spawn gradient min
  0.0025 to exclude depositional reaches. Temperature, thermal
  refugia, and channel-class-based segmentation are not included
  here — those are separate follow-ups.
files:
  rules_yaml: rules.yaml
  dimensions_csv: dimensions.csv
  parameters_fresh: parameters_fresh.csv
  habitat_classification: overrides/user_habitat_classification.csv
  observation_exclusions: overrides/observation_exclusions.csv
  wsg_species: overrides/wsg_species_presence.csv
overrides:
  modelled_fixes: overrides/user_modelled_crossing_fixes.csv
  pscis_barrier_status: overrides/user_pscis_barrier_status.csv
  pscis_xref: overrides/pscis_modelledcrossings_streams_xref.csv
  barriers_definite: overrides/user_barriers_definite.csv
  barriers_definite_control: overrides/user_barriers_definite_control.csv
  crossings_misc: overrides/user_crossings_misc.csv
pipeline:
  break_order:
  - observations
  - gradient_minimal
  - barriers_definite
  - habitat_endpoints
  - crossings
  cluster:
    three_phase: yes
  spawn_connected:
    SK:
      gradient_max: 0.05
