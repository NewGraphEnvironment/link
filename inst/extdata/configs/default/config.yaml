name: default
description: |
  NewGraph default habitat-classification config. Departures from
  bcfishpass are documented in `research/default_vs_bcfishpass.md`:
  intermittent streams included in the rearing set; wetland reaches
  (edge_type 1050/1150) as rearing habitat for species flagged
  `rear_wetland=yes` in dimensions.csv; lake rearing expanded beyond
  SK/KO per literature; `river_skip_cw_min=yes` on river polygons
  where channel-width thresholds don't apply; spawn gradient min
  0.0025 to exclude depositional reaches. Temperature, thermal
  refugia, and channel-class-based segmentation are not included
  here — those are separate follow-ups.

# Non-tabular pipeline inputs (paths only)
rules: rules.yaml
dimensions: dimensions.csv

# Tabular data files. Loaded by lnk_load_overrides(cfg)$<key>.
# Entries with `source` + `canonical_schema` dispatch through crate::crt_ingest();
# others fall through to extension-based local read.
files:
  parameters_fresh:
    path: parameters_fresh.csv
  user_habitat_classification:
    source: bcfp
    path: overrides/user_habitat_classification.csv
    canonical_schema: bcfp/user_habitat_classification
  observation_exclusions:
    path: overrides/observation_exclusions.csv
  wsg_species_presence:
    path: overrides/wsg_species_presence.csv
  user_modelled_crossing_fixes:
    source: bcfp
    path: overrides/user_modelled_crossing_fixes.csv
  user_pscis_barrier_status:
    source: bcfp
    path: overrides/user_pscis_barrier_status.csv
  pscis_modelledcrossings_streams_xref:
    source: bcfp
    path: overrides/pscis_modelledcrossings_streams_xref.csv
  user_barriers_definite:
    source: bcfp
    path: overrides/user_barriers_definite.csv
  user_barriers_definite_control:
    source: bcfp
    path: overrides/user_barriers_definite_control.csv
  user_crossings_misc:
    source: bcfp
    path: overrides/user_crossings_misc.csv

extends: ~

pipeline:
  # break_order — sources of segment break positions, applied in the order
  # listed. Available entries (see ?lnk_pipeline_break):
  #   observations       — fish observations from bcfishobs.observations
  #   gradient_minimal   — minimal-reduced gradient barriers
  #   barriers_definite  — user_barriers_definite.csv
  #   subsurfaceflow     — FWA edge_type 1410/1425 (opt-in; bcfishpass parity)
  #   habitat_endpoints  — DRM/URM from user_habitat_classification
  #   crossings          — PSCIS + modelled crossings
  # default-bundle leaves subsurfaceflow OFF — NewGraph methodology decision
  # pending. Add the entry to opt in.
  break_order:
  - observations
  - gradient_minimal
  - barriers_definite
  - habitat_endpoints
  - crossings
  cluster:
    three_phase: yes
  spawn_connected:
    SK:
      gradient_max: 0.05

